name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:
    inputs:
      Build:
        description: 'Run build'
        required: true
        default: 'true'
      RunMendScan:
        description: 'Run Mend Security Scan'
        required: false
        default: 'false'
      DEV:
        description: 'Deploy to DEV'
        required: false
        default: 'false'

env:
  REGISTRY: "your-registry.jfrog.io"
  TAG: "v${{ github.run_number }}"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - server: abuseipdb-mcp
            dockerfile: Dockerfile.abuseipdb
          - server: whois-mcp
            dockerfile: Dockerfile.whois
          - server: nvd-cve-mcp
            dockerfile: Dockerfile.nvd-cve
          - server: shodan-mcp
            dockerfile: Dockerfile.shodan
          - server: mitre-attack-mcp
            dockerfile: Dockerfile.mitre-attack
          - server: vulncheck-mcp
            dockerfile: Dockerfile.vulncheck
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY }} -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: "Build and Push - ${{ matrix.server }}"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ matrix.server }}:${{ env.TAG }}"
          docker build -t "${IMAGE}" -f "deployments/http/${{ matrix.dockerfile }}" .
          docker push "${IMAGE}"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event.inputs.DEV == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - server: abuseipdb-mcp
            dockerfile: Dockerfile.abuseipdb
          - server: whois-mcp
            dockerfile: Dockerfile.whois
          - server: nvd-cve-mcp
            dockerfile: Dockerfile.nvd-cve
          - server: shodan-mcp
            dockerfile: Dockerfile.shodan
          - server: mitre-attack-mcp
            dockerfile: Dockerfile.mitre-attack
          - server: vulncheck-mcp
            dockerfile: Dockerfile.vulncheck
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Create/update platform auth secret
        run: |
          kubectl create secret generic mcp-platform-auth \
            --from-literal=auth=$(htpasswd -nb mcp "${{ secrets.MCP_PLATFORM_TOKEN }}") \
            --namespace mcp-platform \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply base manifests
        run: |
          kubectl apply -f deployments/kubernetes/base/ingress.yaml
          kubectl apply -f deployments/kubernetes/base/network-policy.yaml

      - name: Apply service manifests
        run: |
          kubectl apply -f deployments/kubernetes/services/${{ matrix.server }}/service.yaml
          kubectl apply -f deployments/kubernetes/services/${{ matrix.server }}/hpa.yaml

      - name: Deploy ${{ matrix.server }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ matrix.server }}:${{ env.TAG }}"
          kubectl delete deployment ${{ matrix.server }} -n mcp-platform --ignore-not-found=true
          sed "s|\$(imagevalue)|${IMAGE}|g" \
            deployments/kubernetes/services/${{ matrix.server }}/deployment.yaml \
            | kubectl apply -f -
          kubectl rollout status deployment/${{ matrix.server }} -n mcp-platform --timeout=300s
