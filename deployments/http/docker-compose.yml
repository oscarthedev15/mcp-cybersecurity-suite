version: '3.8'

services:
  abuseipdb-mcp:
    build:
      context: ../..
      dockerfile: deployments/http/Dockerfile.abuseipdb
    container_name: mcp-abuseipdb-http
    ports:
      - "8008:8008"
    environment:
      - FASTMCP_PORT=8008
      - FASTMCP_HOST=0.0.0.0
      - VERIFY_SSL=true
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-H", "Accept: application/json, text/event-stream", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"healthcheck\",\"version\":\"1.0\"}},\"id\":1}", "http://localhost:8008/mcp/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  whois-mcp:
    build:
      context: ../..
      dockerfile: deployments/http/Dockerfile.whois
    container_name: mcp-whois-http
    ports:
      - "8009:8009"
    environment:
      - FASTMCP_PORT=8009
      - FASTMCP_HOST=0.0.0.0
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-H", "Accept: application/json, text/event-stream", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"healthcheck\",\"version\":\"1.0\"}},\"id\":1}", "http://localhost:8009/mcp/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nvd-cve-mcp:
    build:
      context: ../..
      dockerfile: deployments/http/Dockerfile.nvd-cve
    container_name: mcp-nvd-cve-http
    ports:
      - "8010:8010"
    environment:
      - FASTMCP_PORT=8010
      - FASTMCP_HOST=0.0.0.0
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-H", "Accept: application/json, text/event-stream", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"healthcheck\",\"version\":\"1.0\"}},\"id\":1}", "http://localhost:8010/mcp/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  shodan-mcp:
    build:
      context: ../..
      dockerfile: deployments/http/Dockerfile.shodan
    container_name: mcp-shodan-http
    ports:
      - "8011:8011"
    environment:
      - FASTMCP_PORT=8011
      - FASTMCP_HOST=0.0.0.0
      - VERIFY_SSL=true
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-H", "Accept: application/json, text/event-stream", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"healthcheck\",\"version\":\"1.0\"}},\"id\":1}", "http://localhost:8011/mcp/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mitre-attack-mcp:
    build:
      context: ../..
      dockerfile: deployments/http/Dockerfile.mitre-attack
    container_name: mcp-mitre-attack-http
    ports:
      - "8012:8012"
    environment:
      - FASTMCP_PORT=8012
      - FASTMCP_HOST=0.0.0.0
      - STIX_DATA_PATH=/app/data/enterprise-attack.json
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-H", "Accept: application/json, text/event-stream", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"healthcheck\",\"version\":\"1.0\"}},\"id\":1}", "http://localhost:8012/mcp/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  vulncheck-mcp:
    build:
      context: ../..
      dockerfile: deployments/http/Dockerfile.vulncheck
    container_name: mcp-vulncheck-http
    ports:
      - "8013:8013"
    environment:
      - FASTMCP_PORT=8013
      - FASTMCP_HOST=0.0.0.0
      - VERIFY_SSL=true
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-H", "Accept: application/json, text/event-stream", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"healthcheck\",\"version\":\"1.0\"}},\"id\":1}", "http://localhost:8013/mcp/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: mcp-nginx-proxy
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - abuseipdb-mcp
      - whois-mcp
      - nvd-cve-mcp
      - shodan-mcp
      - mitre-attack-mcp
      - vulncheck-mcp
    restart: unless-stopped

networks:
  mcp-network:
    driver: bridge
